name: "FlagLint"
description: "Enforce LaunchDarkly SDK policies and scan for flag debt in your codebase."
author: "flaglint"

branding:
  icon: flag
  color: green

inputs:
  directory:
    description: "Directory to scan"
    required: false
    default: "."
  command:
    description: "FlagLint command to run: validate, scan, or audit"
    required: false
    default: "validate"
  extra-args:
    description: "Additional CLI flags to pass to flaglint"
    required: false
    default: ""
  node-version:
    description: "Node.js version to use"
    required: false
    default: "20"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run FlagLint
      shell: bash
      env:
        FLAGLINT_COMMAND: ${{ inputs.command }}
        FLAGLINT_DIRECTORY: ${{ inputs.directory }}
        FLAGLINT_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        if [ "$FLAGLINT_COMMAND" = "validate" ]; then
          npx flaglint@latest validate "$FLAGLINT_DIRECTORY" --no-direct-launchdarkly $FLAGLINT_EXTRA_ARGS
        else
          npx flaglint@latest "$FLAGLINT_COMMAND" "$FLAGLINT_DIRECTORY" $FLAGLINT_EXTRA_ARGS
        fi
