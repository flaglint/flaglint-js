# Sample GitHub Actions workflow for a repository adopting FlagLint.
#
# Copy this file to .github/workflows/flaglint.yml in your own repository.
# Replace `npx flaglint` with `npx flaglint@<version>` once the version that
# includes the features you need has been published to npm.
#
# What this workflow does:
#   1. Scans for direct LaunchDarkly SDK call-sites and uploads SARIF to
#      GitHub Code Scanning (shows annotations on PRs).
#   2. Generates a migration plan and uploads it as a downloadable artifact.
#   3. Advisory enforcement: flags violations in src/ (expected during migration).
#   4. Hard enforcement gate: validates after-complete/ to confirm the fully
#      migrated snapshot contains zero direct LaunchDarkly calls.

name: FlagLint — LaunchDarkly OpenFeature Migration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flaglint:
    name: Flag scan and migration enforcement
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Step 1: Inventory ────────────────────────────────────────────────────
      # Scan for all direct LaunchDarkly SDK call-sites in src/.
      # Produces an HTML inventory report and a SARIF file.

      - name: Scan — generate HTML inventory report
        run: |
          npx flaglint scan ./src \
            --format html \
            --output generated-reports/inventory-report.html
        continue-on-error: true

      - name: Validate — generate SARIF for GitHub Code Scanning
        run: |
          npx flaglint validate ./src \
            --no-direct-launchdarkly \
            --bootstrap-exclude "platform/feature-flags.ts" \
            --format sarif \
            --output flaglint-validate.sarif
        continue-on-error: true

      # Upload SARIF to GitHub Code Scanning — shows PR annotations for each violation.
      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: flaglint-validate.sarif
        continue-on-error: true

      - name: Upload HTML inventory report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: inventory-report-node${{ matrix.node-version }}
          path: generated-reports/inventory-report.html
          retention-days: 30

      # ── Step 2: Migration plan ───────────────────────────────────────────────
      # Produce a reviewable before/after diff for every automatable call-site.

      - name: Migrate — generate migration plan (dry-run)
        run: |
          npx flaglint migrate ./src --dry-run > generated-reports/migration-plan.md
        continue-on-error: true

      - name: Upload migration plan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-plan-node${{ matrix.node-version }}
          path: generated-reports/migration-plan.md
          retention-days: 30

      # ── Step 3: Advisory enforcement on src/ ─────────────────────────────────
      # Fails while direct LaunchDarkly call-sites remain in src/.
      # Set continue-on-error: false once all manual-review items are resolved.
      # In this demo, analytics.ts, product.ts, and flags-wrapper.ts intentionally
      # retain direct LD calls to demonstrate the manual-review cases.

      - name: Validate — advisory enforcement on src/
        run: |
          npx flaglint validate ./src \
            --no-direct-launchdarkly \
            --bootstrap-exclude "platform/feature-flags.ts"
        continue-on-error: true

      # ── Step 4: Hard enforcement gate on after-complete/ ────────────────────
      # The after-complete/ directory is a committed snapshot of the fully migrated
      # state. This gate enforces that the snapshot contains zero direct LD calls.
      # Fails hard (no continue-on-error) — this is the green-line check.

      - name: Validate — hard gate on after-complete/ (must pass)
        run: |
          npx flaglint validate ./after-complete \
            --no-direct-launchdarkly
