name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run

  publish:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing / OIDC

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Runtime support is Node >=20. Publishing uses Node 24 because npm
          # Trusted Publishing/OIDC requires npm >=11.5.1 and Node >=22.14.0.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Use npm with trusted publishing support
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "ERROR: Git tag v$TAG_VERSION does not match package.json version $PACKAGE_VERSION."
            echo "Update package.json and package-lock.json before creating the release tag."
            exit 1
          fi

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public
