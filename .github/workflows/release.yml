name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run

  publish:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing / OIDC

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Runtime support is Node >=20. Publishing uses Node 24 because npm
          # Trusted Publishing/OIDC requires npm >=11.5.1 and Node >=22.14.0.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Use npm with trusted publishing support
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "ERROR: Git tag v$TAG_VERSION does not match package.json version $PACKAGE_VERSION."
            echo "Update package.json and package-lock.json before creating the release tag."
            exit 1
          fi

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        # --provenance was dropped during the May repo rename (now long
        # propagated); re-enable it. Provenance requires the id-token: write
        # permission granted on this job above.
        run: npm publish --provenance --access public

  update-homebrew:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read

    steps:
      - name: Bump Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://registry.npmjs.org/flaglint/-/flaglint-${VERSION}.tgz"

          # Wait briefly for npm CDN propagation
          sleep 15

          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')

          echo "Version: $VERSION"
          echo "SHA256:  $SHA256"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/flaglint/homebrew-tap.git" tap
          cd tap

          sed -i "s|url \"https://registry.npmjs.org/flaglint/-/flaglint-.*\.tgz\"|url \"${TARBALL_URL}\"|" Formula/flaglint.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/flaglint.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/flaglint.rb
          git diff --cached --quiet && echo "No changes needed" && exit 0
          git commit -m "chore: bump flaglint formula to ${VERSION}"
          git push
